name: Vprofile CICD Workflow

on: 
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

  schedule:
    - cron: "10 14 * * 1-5"

permissions: 
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Maven Build
        run: mvn -B clean install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

  Testing:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Tests
        run: mvn test

      - name: Checkstyle
        run: mvn checkstyle:checkstyle

  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
          sh install.sh -b /usr/local/bin

      # ✅ FIX: exclude Maven completely (this removes 429 error permanently)
      - name: Run Trivy scan
        run: |
          trivy fs . \
            --scanners vuln,secret \
            --skip-files "**/pom.xml" \
            --skip-dirs "**/.m2/**" \
            --skip-dirs "**/target/**" \
            -f json \
            -o trivy-results.json \
            --exit-code 0

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json