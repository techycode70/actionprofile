name: Vprofile CICD Workflow

on: 
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

  schedule:
    - cron: "10 14 * * 1-5"

permissions: 
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      # ✅ FIX: Maven cache prevents 429 errors
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # ✅ FIX: Pre-download dependencies (avoids Trivy/Maven conflict)
      - name: Download dependencies
        run: mvn -B dependency:go-offline

      - name: Build with Maven
        run: mvn -B clean install

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

  Testing:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Tests
        run: mvn test

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle

  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      # ✅ Stable Trivy install
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
          sh install.sh -b /usr/local/bin

      # ✅ FIX: Avoid Maven-heavy scanning issues
      - name: Run Trivy filesystem scan
        run: trivy fs . --scanners vuln --format json -o trivy-results.json --exit-code 0

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json