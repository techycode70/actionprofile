Security_Scan:
  runs-on: ubuntu-latest
  needs: Build

  steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    # ✅ FIX: download dependencies (prevents Maven Central 429)
    - name: Download Maven dependencies
      run: mvn -B dependency:go-offline

    # Install Trivy safely
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        sh install.sh -b /usr/local/bin

    # ✅ FIX: correct Trivy command (no invalid flags)
    - name: Run Trivy scan
      run: trivy fs . --scanners vuln --format json -o trivy-results.json --exit-code 0

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: trivy-results.json