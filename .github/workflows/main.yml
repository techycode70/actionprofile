name: Vprofile CICD Workflow

on: 
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

  schedule:
    - cron: "10 14 * * 1-5"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: 
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build with Maven
        run: mvn -B clean install

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Tests
        run: mvn test

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle

  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      - name: Run Trivy scan (non-blocking)
        run: trivy fs . -f json -o trivy-results.json --exit-code 0

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json